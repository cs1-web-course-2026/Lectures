<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="neon-card">
    <div class="card-avatar-wrapper">
      <img src="cat-avatar.jpg" alt="Engineer Cat" class="card-avatar">
    </div>
    <h1 class="card-title">Cat Engineerenko</h1>
    <p class="neon-label">Meow Engineer</p>
    <p class="skills">Skills: Html, Css, Fish.js</p>
    <a href="https://www.google.com" class="neon-btn">More info</a>
  </div>
</body>
</html>
