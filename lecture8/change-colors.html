<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Магічний Хамелеон</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        background-color: #f0f0f0;
      }
      #chameleon {
        font-size: 100px;
        cursor: pointer;
        transform: scale(1);
        transition: transform 0.3s;
      }
      #chameleon:hover {
        transform: scale(1.2);
      }
      .chameleon-info {
        font-size: 24px;
        color: #555;
      }
      button {
        font-size: 18px;
        margin: 10px;
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Зустрічай Паскаля, Магічного Хамелеона!</h1>

    <div id="chameleon">🦎</div>
    <p id="chameleon-name" class="chameleon-info">Його звати Паскаль</p>
    <p class="chameleon-info">Він любить змінювати колір</p>

    <button id="color-button">Змінити колір</button>
    <button id="name-button">Дати нове ім'я</button>

    <script>
      // --- Демонстрація 1: Пошук елементів ---

      // Знаходимо елементи за їх ID
      const chameleonElement = document.getElementById('chameleon');
      const nameElement = document.getElementById('chameleon-name');
      const colorButton = document.getElementById('color-button');
      const nameButton = document.getElementById('name-button');

      // Знаходимо ВСІ елементи за класом
      const infoElements = document.getElementsByClassName('chameleon-info');
      console.log('Знайдені елементи з класом "chameleon-info":', infoElements);

      // --- Демонстрація 2: Зміна контенту та стилів ---

      // Функція для генерації випадкового кольору
      function getRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
          color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
      }

      // Змінюємо колір хамелеона при кліку на кнопку
      colorButton.onclick = function () {
        const newColor = getRandomColor();
        chameleonElement.style.color = newColor; // Змінюємо CSS властивість
        // Змінюємо колір тексту для всіх елементів з класом .chameleon-info
        for (let i = 0; i < infoElements.length; i++) {
          infoElements[i].style.color = newColor;
        }
      };

      // Змінюємо ім'я хамелеона
      nameButton.onclick = function () {
        const newName = prompt('Як назвемо хамелеона?', 'Леон');
        if (newName) {
          nameElement.textContent = `Тепер його звати ${newName}!`; // Безпечно змінюємо текст
        }
      };

      // Додамо трохи інтерактиву
      // chameleonElement.onmouseover = function () {
      //   chameleonElement.style.transform = 'scale(1.2)';
      // };
      // chameleonElement.onmouseout = function () {
      //   chameleonElement.style.transform = 'scale(1)';
      // };
    </script>
  </body>
</html>
